# 语气词库
# 用于 ASR 后处理和文稿裁剪

standalone_fillers:
  # 纯语气词（独立出现时删除）
  - "嗯"
  - "啊"
  - "呃"
  - "额"
  - "噢"
  - "唔"
  - "哈"
  - "哎"
  - "唉"
  - "哦"

sentence_fillers:
  # 句首语气词（出现在句首时可删除）
  - "其实吧"
  - "怎么说呢"
  - "说实话"
  - "老实说"
  - "我跟你说"
  - "你知道吗"
  - "你知道吧"

connectors:
  # 连接词（频繁重复时删除，保留第一个）
  - "然后"
  - "就是"
  - "那"
  - "所以"
  - "对吧"
  - "是不是"
  - "对不对"
  - "是吧"

repetition_patterns:
  # 重复表达模式
  - pattern: "就是说"
    replacement: "说"
  - pattern: "然后然后"
    replacement: "然后"

hesitation_sounds:
  # 犹豫音（检测到就删除）
  - "这个"
  - "那个"
  - "就是说"
  - "等于说"
  - "就相当于"
